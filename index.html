
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym Pro AI - Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; overflow-x: hidden; }
        .ios-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .tab-active { color: #2563eb; border-top: 3px solid #2563eb; font-weight: 800; }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        input[type="number"] { font-size: 16px !important; border: 1px solid #f1f5f9; }
        .ai-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 p-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-800 tracking-tight italic">GYM<span class="text-blue-600">PRO</span> AI</h1>
                <div id="hacim-ozet" class="text-[10px] font-black text-blue-500 uppercase tracking-widest mt-1">0 KG HACİM</div>
            </div>
            <div class="flex items-center gap-3">
                <div id="rest-timer" class="hidden bg-orange-50 text-orange-600 px-3 py-1 rounded-full text-[10px] font-bold">00:00</div>
                <button onclick="toggleSettings()" class="text-slate-400 p-2"><i class="fas fa-cog text-xl"></i></button>
            </div>
        </div>
    </header>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 z-[100] bg-black/70 hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 space-y-5 shadow-2xl">
            <h3 class="text-xl font-bold">Ayarlar</h3>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase">Gemini API Key</label>
                <input id="api-key-input" type="password" placeholder="AI Key Yapıştırın" class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-slate-200 focus:ring-2 focus:ring-blue-500">
                <p id="key-status" class="text-[10px] font-bold text-slate-400 uppercase italic">Key Girilmedi.</p>
            </div>
            <div class="flex gap-2">
                <button onclick="saveSettings()" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-bold text-sm">KAYDET</button>
                <button onclick="toggleSettings()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-xl font-bold text-sm">KAPAT</button>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- Tab 1: Antrenman -->
        <div id="tab-workout" class="tab-content">
            <div id="workout-list" class="space-y-4"></div>
            <button onclick="openLibrary()" class="w-full mt-6 py-5 border-2 border-dashed border-slate-200 rounded-[1.5rem] text-slate-400 font-bold flex items-center justify-center gap-2">
                <i class="fas fa-plus-circle"></i> Egzersiz Ekle
            </button>
            <button id="complete-btn" onclick="finishWorkout()" class="hidden w-full mt-4 bg-blue-600 text-white py-5 rounded-[1.5rem] font-bold shadow-lg shadow-blue-100">
                Antrenmanı Bitir
            </button>
        </div>

        <!-- Tab 2: AI Koç -->
        <div id="tab-ai" class="tab-content hidden space-y-5">
            <div class="ai-gradient text-white p-8 rounded-[2rem] shadow-xl relative overflow-hidden">
                <i class="fas fa-magic absolute -right-5 -top-5 text-white/5 text-9xl"></i>
                <h3 class="text-xl font-bold relative z-10">AI Dinamik Koç</h3>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest relative z-10 italic">1.72m / 76kg / %20 Yağ</p>
            </div>

            <div class="ios-card p-6 space-y-5">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Bugünkü Durumun</label>
                    <textarea id="ai-mood" placeholder="Örn: Yorgunum, hafif bir program olsun..." class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none text-sm min-h-[100px] mt-1"></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Odak Noktan</label>
                    <input id="ai-focus" type="text" placeholder="Örn: Omuz ve Karın" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none text-sm mt-1">
                </div>
                <button id="ai-btn" onclick="generateAIProgram()" class="w-full bg-blue-600 text-white py-5 rounded-xl font-bold flex items-center justify-center gap-3">
                    <span id="ai-btn-text">PROGRAMI HAZIRLA</span>
                    <i id="ai-spinner" class="fas fa-circle-notch spinner hidden"></i>
                </button>
            </div>

            <div id="ai-advice-box" class="hidden ios-card p-5 border-l-4 border-blue-500 bg-blue-50/30">
                <div class="text-[10px] font-black text-blue-600 uppercase mb-1">Koçun Notu</div>
                <p id="ai-advice-text" class="text-sm text-slate-600 italic"></p>
            </div>
        </div>

        <!-- Tab 3: Geçmiş -->
        <div id="tab-history" class="tab-content hidden space-y-4">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-xl font-bold tracking-tight">Geçmiş</h2>
                <button onclick="clearHistory()" class="text-[10px] text-red-500 font-bold uppercase">Sıfırla</button>
            </div>
            <div id="history-list" class="space-y-6"></div>
        </div>

    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-0 inset-x-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 px-8 py-5 flex justify-between items-center z-50 rounded-t-[2rem]">
        <button onclick="switchTab('workout')" id="nav-workout" class="flex flex-col items-center gap-1 tab-active">
            <i class="fas fa-dumbbell text-xl"></i>
            <span class="text-[9px] font-black tracking-tighter uppercase">Antrenman</span>
        </button>
        <button onclick="switchTab('ai')" id="nav-ai" class="flex flex-col items-center gap-1 text-slate-300">
            <i class="fas fa-sparkles text-xl"></i>
            <span class="text-[9px] font-black tracking-tighter uppercase">AI Koç</span>
        </button>
        <button onclick="switchTab('history')" id="nav-history" class="flex flex-col items-center gap-1 text-slate-300">
            <i class="fas fa-calendar-alt text-xl"></i>
            <span class="text-[9px] font-black tracking-tighter uppercase">Geçmiş</span>
        </button>
    </nav>

    <!-- Egzersiz Kütüphanesi -->
    <div id="lib-modal" class="fixed inset-0 z-[80] bg-black/50 hidden flex items-end">
        <div class="bg-white w-full rounded-t-[2.5rem] p-8 max-h-[80vh] overflow-y-auto transform translate-y-full transition-transform duration-300" id="lib-panel">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold uppercase">Hareketler</h3>
                <button onclick="closeLibrary()" class="bg-slate-50 p-2 rounded-full text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            <div id="lib-content" class="space-y-6 pb-10"></div>
        </div>
    </div>

    <!-- Toast Message -->
    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 z-[200] hidden bg-slate-900 text-white px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest shadow-2xl">
        <span id="toast-msg"></span>
    </div>

    <script>
        // --- DATA STATE ---
        let state = {
            activeWorkout: JSON.parse(localStorage.getItem('gym_v10_active')) || [],
            history: JSON.parse(localStorage.getItem('gym_v10_history')) || [],
            timer: { interval: null, remaining: 0 }
        };

        const libraryData = {
            "Göğüs": ["Bench Press", "Incline DB Press", "Dips", "Cable Fly"],
            "Sırt": ["Barbell Row", "Lat Pulldown", "Pull-up", "Seated Row", "Deadlift"],
            "Bacak": ["Squat", "Leg Press", "Romanian DL", "Bulgarian Split", "Leg Extension"],
            "Omuz": ["Overhead Press", "Lateral Raise", "Face Pull"],
            "Kol": ["Barbell Curl", "Skullcrusher", "Tricep Pushdown"]
        };

        // --- RENDER WORKOUT ---
        function render() {
            const list = document.getElementById('workout-list');
            list.innerHTML = '';
            
            if (state.activeWorkout.length === 0) {
                list.innerHTML = `<div class="py-20 text-center opacity-30 font-bold uppercase text-[10px] tracking-widest">Antrenman Listesi Boş</div>`;
            }

            state.activeWorkout.forEach((ex, exIdx) => {
                const card = document.createElement('div');
                card.className = 'ios-card p-6 space-y-5';
                
                let setsHtml = ex.sets.map((s, sIdx) => `
                    <div class="grid grid-cols-6 gap-2 items-center">
                        <span class="text-[10px] font-black text-slate-300 text-center">${sIdx + 1}</span>
                        <input type="number" value="${s.w}" oninput="silentUpdate(${exIdx}, ${sIdx}, 'w', this.value)" placeholder="KG" class="col-span-2 bg-slate-50 rounded-xl p-3 text-center font-bold text-sm outline-none">
                        <input type="number" value="${s.r}" oninput="silentUpdate(${exIdx}, ${sIdx}, 'r', this.value)" placeholder="TK" class="col-span-1 bg-slate-50 rounded-xl p-3 text-center font-bold text-sm outline-none">
                        <input type="number" value="${s.rpe}" oninput="silentUpdate(${exIdx}, ${sIdx}, 'rpe', this.value)" placeholder="RPE" class="col-span-1 bg-blue-50/50 text-blue-600 rounded-xl p-3 text-center font-bold text-sm outline-none">
                        <div class="text-center font-mono text-[9px] font-black text-emerald-500 leading-tight">
                            <span id="rm-${exIdx}-${sIdx}">${calc1RM(s.w, s.r)}</span><br><span class="text-[7px] text-slate-300 uppercase">1RM</span>
                        </div>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold text-slate-800 text-base uppercase">${ex.name}</h4>
                            <span id="vol-${exIdx}" class="text-[8px] font-black text-blue-500 uppercase tracking-widest mt-1 inline-block">0 KG HACİM</span>
                        </div>
                        <button onclick="removeEx(${exIdx})" class="text-slate-200"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <div class="space-y-2">${setsHtml}</div>
                    <div class="flex justify-between items-center pt-2">
                        <button onclick="addSet(${exIdx})" class="text-blue-600 font-bold text-[9px] uppercase tracking-widest">+ SET</button>
                        <button onclick="startTimer(90)" class="text-orange-500 font-bold text-[9px] uppercase tracking-widest"><i class="fas fa-clock"></i> 90S DİNLEN</button>
                    </div>
                `;
                list.appendChild(card);
            });

            updateTotalDisplay();
            localStorage.setItem('gym_v10_active', JSON.stringify(state.activeWorkout));
        }

        // Klavye kapanmadan güncelleme
        function silentUpdate(exI, sI, field, val) {
            state.activeWorkout[exI].sets[sI][field] = val;
            const rmDisplay = document.getElementById(`rm-${exI}-${sI}`);
            if (rmDisplay) rmDisplay.innerText = calc1RM(state.activeWorkout[exI].sets[sI].w, state.activeWorkout[exI].sets[sI].r);
            updateTotalDisplay();
            localStorage.setItem('gym_v10_active', JSON.stringify(state.activeWorkout));
        }

        function updateTotalDisplay() {
            let total = 0;
            state.activeWorkout.forEach((ex, i) => {
                let exVol = ex.sets.reduce((a, s) => a + (parseFloat(s.w || 0) * parseFloat(s.r || 0)), 0);
                total += exVol;
                const disp = document.getElementById(`vol-${i}`);
                if (disp) disp.innerText = `${exVol.toLocaleString()} KG HACİM`;
            });
            document.getElementById('hacim-ozet').innerText = `${total.toLocaleString()} KG HACİM`;
            document.getElementById('complete-btn').classList.toggle('hidden', state.activeWorkout.length === 0);
        }

        function calc1RM(w, r) {
            const weight = parseFloat(w); const reps = parseFloat(r);
            if (!weight || !reps || reps <= 0) return 0;
            return Math.round(weight * (1 + (reps / 30))); // Epley Formula
        }

        // --- RENDER HISTORY (GROUPED BY DATE) ---
        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            if (state.history.length === 0) {
                list.innerHTML = `<p class="text-center py-20 opacity-30 text-[10px] font-bold uppercase">Henüz Kayıt Yok</p>`;
                return;
            }

            // Grouping logic
            const grouped = state.history.reduce((groups, entry) => {
                const date = entry.date;
                if (!groups[date]) groups[date] = [];
                groups[date].push(entry);
                return groups;
            }, {});

            Object.keys(grouped).forEach(date => {
                const daySection = document.createElement('div');
                daySection.className = 'space-y-3';
                
                daySection.innerHTML = `<div class="text-[10px] font-black text-slate-300 uppercase tracking-widest border-b pb-1 px-1">${date}</div>`;
                
                grouped[date].forEach((session, sIdx) => {
                    const card = document.createElement('div');
                    card.className = 'ios-card p-5 flex justify-between items-center';
                    card.innerHTML = `
                        <div>
                            <div class="text-lg font-bold tracking-tighter">${session.volume.toLocaleString()} KG</div>
                            <div class="text-[9px] font-black text-blue-500 uppercase tracking-widest">${session.summary}</div>
                        </div>
                        <i class="fas fa-check-circle text-emerald-500 text-lg"></i>
                    `;
                    daySection.appendChild(card);
                });
                list.appendChild(daySection);
            });
        }

        // --- AI LOGIC ---
        async function generateAIProgram() {
            const key = localStorage.getItem('gym_api_key') || "";
            if (!key) return toast("Lütfen Ayarlardan API Key Girin!");
            
            const mood = document.getElementById('ai-mood').value;
            const focus = document.getElementById('ai-focus').value;
            if(!mood || !focus) return toast("Alanları doldurun!");

            const btnText = document.getElementById('ai-btn-text');
            const spinner = document.getElementById('ai-spinner');
            const adviceBox = document.getElementById('ai-advice-box');
            const adviceText = document.getElementById('ai-advice-text');

            btnText.innerText = "Koç Programı Yazıyor...";
            spinner.classList.remove('hidden');

            const sys = `Sen profesyonel bir fitness koçusun. Boy: 1.72m, Kilo: 76kg, Yağ: %20. 
            Aşağıdaki JSON formatında yanıt ver:
            {
              "not": "Koçun tavsiyesi (Türkçe)",
              "egzersizler": [{"ad": "Hareket Adı", "setler": 3}]
            }`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Duygu: ${mood}. Odak: ${focus}. Plan çıkar.` }] }],
                        systemInstruction: { parts: [{ text: sys }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);

                adviceText.innerText = result.not;
                adviceBox.classList.remove('hidden');

                state.activeWorkout = result.egzersizler.map(ex => ({
                    name: ex.ad,
                    sets: Array.from({ length: ex.setler }, () => ({ w: '', r: '', rpe: '' }))
                }));

                render();
                toast("Program Listeye Aktarıldı!");
                setTimeout(() => switchTab('workout'), 2000);

            } catch (err) {
                toast("Hata! Key veya Bağlantıyı kontrol et.");
            } finally {
                btnText.innerText = "PROGRAMI HAZIRLA";
                spinner.classList.add('hidden');
            }
        }

        // --- CORE ACTIONS ---
        function addSet(exI) { state.activeWorkout[exI].sets.push({w:'', r:'', rpe:''}); render(); }
        function removeEx(idx) { if(confirm("Egzersizi silmek istiyor musun?")) { state.activeWorkout.splice(idx, 1); render(); } }
        
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-slate-300'));
            document.getElementById('nav-'+t).classList.add('tab-active');
            if(t === 'history') renderHistory();
        }

        function finishWorkout() {
            if(!state.activeWorkout.length) return;
            const volume = state.activeWorkout.reduce((acc, ex) => acc + ex.sets.reduce((sAcc, s) => sAcc + (parseFloat(s.w||0)*parseFloat(s.r||0)), 0), 0);
            const summary = state.activeWorkout.map(ex => ex.name).join(', ').slice(0, 40) + '...';
            
            state.history.unshift({
                date: new Date().toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric' }),
                volume: volume,
                summary: summary
            });
            
            state.activeWorkout = [];
            localStorage.setItem('gym_v10_history', JSON.stringify(state.history));
            toast("Antrenman Kaydedildi!");
            render(); switchTab('history');
        }

        function clearHistory() { if(confirm("Tüm geçmiş silinsin mi?")) { state.history = []; localStorage.setItem('gym_v10_history', "[]"); renderHistory(); } }

        function toggleSettings() { 
            document.getElementById('settings-modal').classList.toggle('hidden'); 
            document.getElementById('api-key-input').value = localStorage.getItem('gym_api_key') || "";
            updateKeyStatus();
        }
        function updateKeyStatus() {
            const k = localStorage.getItem('gym_api_key');
            document.getElementById('key-status').innerText = k ? "Key Kayıtlı (Aktif)" : "Key Girilmedi.";
            document.getElementById('key-status').className = k ? "text-[10px] font-bold text-emerald-500 uppercase italic" : "text-[10px] font-bold text-red-400 uppercase italic";
        }
        function saveSettings() {
            localStorage.setItem('gym_api_key', document.getElementById('api-key-input').value.trim());
            updateKeyStatus();
            setTimeout(toggleSettings, 300);
            toast("Ayarlar Kaydedildi");
        }

        function toast(m) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = m;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3500);
        }

        function startTimer(s) {
            clearInterval(state.timer.interval);
            state.timer.remaining = s;
            document.getElementById('rest-timer').classList.remove('hidden');
            state.timer.interval = setInterval(() => {
                state.timer.remaining--;
                const m = Math.floor(state.timer.remaining / 60);
                const sc = state.timer.remaining % 60;
                document.getElementById('rest-timer').innerText = `${m}:${sc.toString().padStart(2,'0')}`;
                if(state.timer.remaining <= 0) {
                    clearInterval(state.timer.interval);
                    toast("Dinlenme Bitti!");
                    setTimeout(() => document.getElementById('rest-timer').classList.add('hidden'), 2000);
                }
            }, 1000);
        }

        function openLibrary() {
            document.getElementById('lib-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('lib-panel').classList.remove('translate-y-full'), 10);
            const content = document.getElementById('lib-content');
            content.innerHTML = '';
            for(let group in libraryData) {
                const section = document.createElement('div');
                section.innerHTML = `<h4 class="text-[10px] font-black text-slate-300 uppercase mb-3 border-b pb-1 tracking-widest">${group}</h4><div class="grid grid-cols-2 gap-2">${libraryData[group].map(ex => `<button onclick="addEx('${ex}')" class="p-4 bg-slate-50 rounded-xl text-[11px] font-bold text-slate-700 text-left active:bg-blue-600 active:text-white transition-all">${ex}</button>`).join('')}</div>`;
                content.appendChild(section);
            }
        }
        function closeLibrary() {
            document.getElementById('lib-panel').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('lib-modal').classList.add('hidden'), 300);
        }
        function addEx(name) {
            state.activeWorkout.push({ name: name, sets: [{w:'', r:'', rpe:''}] });
            closeLibrary(); render();
        }

        window.onload = render;
    </script>
</body>
</html>
