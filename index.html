
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym Pro AI - Koç Sürümü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .ios-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .tab-active { color: #2563eb; border-top: 3px solid #2563eb; font-weight: 800; }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .knowledge-sheet { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        input[type="number"] { font-size: 16px !important; } /* iPhone zoom engelleme */
    </style>
</head>
<body class="pb-32">

    <!-- Navbar Üst -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 p-5">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-800 tracking-tight italic">GYM<span class="text-blue-600">PRO</span> AI</h1>
                <div id="hacim-gosterge" class="text-[10px] font-black text-blue-500 uppercase tracking-widest mt-1">0 KG HACİM</div>
            </div>
            <div class="flex items-center gap-3">
                <div id="kronometre" class="hidden bg-orange-50 text-orange-600 px-3 py-1 rounded-full text-[10px] font-bold">00:00</div>
                <button onclick="ayarlariAc()" class="text-slate-400 p-2"><i class="fas fa-cog"></i></button>
            </div>
        </div>
    </header>

    <!-- Ayarlar Modalı -->
    <div id="ayarlar-modal" class="fixed inset-0 z-[100] bg-black/60 hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 space-y-5">
            <h3 class="text-xl font-bold">AI Bağlantısı</h3>
            <p class="text-xs text-slate-400">Google Gemini API anahtarınızı buraya girin. Ücretsizdir ve cihazınızda saklanır.</p>
            <input id="api-key-input" type="password" placeholder="AI Key Yapıştır" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100 focus:ring-2 focus:ring-blue-500">
            <div class="flex gap-2">
                <button onclick="ayarlariKaydet()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold">Kaydet</button>
                <button onclick="ayarlariAc()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold">Kapat</button>
            </div>
            <a href="https://aistudio.google.com/app/apikey" target="_blank" class="block text-center text-[10px] text-blue-500 underline font-bold">Ücretsiz Key Al</a>
        </div>
    </div>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- SEKMELER -->
        <div id="tab-antrenman" class="tab-content">
            <div id="liste-egzersiz" class="space-y-4">
                <!-- Egzersizler buraya gelecek -->
            </div>
            <button onclick="kutuphaneyiAc()" class="w-full mt-6 py-6 border-2 border-dashed border-slate-200 rounded-[2.5rem] text-slate-300 font-bold flex items-center justify-center gap-2">
                <i class="fas fa-plus-circle"></i> Manuel Ekle
            </button>
            <button id="bitir-btn" onclick="antrenmaniBitir()" class="hidden w-full mt-4 bg-blue-600 text-white py-5 rounded-[2.5rem] font-bold shadow-xl shadow-blue-100">
                Antrenmanı Tamamla
            </button>
        </div>

        <div id="tab-ai" class="tab-content hidden space-y-5">
            <div class="bg-slate-900 text-white p-8 rounded-[2.5rem] relative overflow-hidden shadow-2xl">
                <i class="fas fa-robot absolute -right-5 -top-5 text-white/5 text-9xl"></i>
                <h3 class="text-xl font-bold relative z-10">AI Dinamik Koç</h3>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest relative z-10">Antrenmanı senin için hazırlar</p>
            </div>

            <div class="ios-card p-7 space-y-5">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Bugün nasıl hissediyorsun?</label>
                    <textarea id="ai-mod-input" placeholder="Yorgunum, belim ağrıyor veya enerjim yerinde..." class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none text-sm min-h-[100px] mt-1"></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Odaklanmak istediğin yer?</label>
                    <input id="ai-odak-input" type="text" placeholder="Örn: Sadece kollar ve omuz" class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none text-sm mt-1">
                </div>
                <button id="ai-btn" onclick="aiProgramHazirla()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold flex items-center justify-center gap-3 active:scale-95 transition-all shadow-lg shadow-blue-100">
                    <span id="ai-btn-metin">PROGRAMI HAZIRLA</span>
                    <i id="ai-yukleniyor" class="fas fa-circle-notch spinner hidden"></i>
                </button>
            </div>

            <div id="ai-not-kutusu" class="hidden ios-card p-6 border-l-4 border-blue-500 bg-blue-50/50">
                <div class="text-[10px] font-black text-blue-600 uppercase mb-2">Koçun Notu:</div>
                <p id="ai-not-metin" class="text-sm text-slate-600 italic leading-relaxed"></p>
            </div>
        </div>

        <div id="tab-gecmis" class="tab-content hidden space-y-4">
            <h2 class="text-xl font-bold px-2">Geçmiş</h2>
            <div id="liste-gecmis" class="space-y-3"></div>
        </div>

    </main>

    <!-- Bilgi Pop-up (Knowledge Sheet) -->
    <div id="bilgi-modal" class="fixed inset-0 z-[110] bg-black/60 hidden flex items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-10 max-h-[85vh] overflow-y-auto knowledge-sheet">
            <div class="flex justify-between items-center mb-6">
                <h3 id="bilgi-baslik" class="text-2xl font-bold">Bilgi</h3>
                <button onclick="bilgiKapat()" class="text-slate-300 text-2xl"><i class="fas fa-times-circle"></i></button>
            </div>
            <p id="bilgi-icerik" class="text-slate-500 leading-relaxed text-sm"></p>
        </div>
    </div>

    <!-- Alt Navigasyon -->
    <nav class="fixed bottom-0 inset-x-0 bg-white/80 backdrop-blur-xl border-t border-slate-100 px-10 py-6 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-2xl">
        <button onclick="sekmeDegistir('antrenman')" id="nav-antrenman" class="flex flex-col items-center gap-1 tab-active transition-all">
            <i class="fas fa-dumbbell text-xl"></i>
            <span class="text-[9px] font-black uppercase tracking-tighter">ANTRENMAN</span>
        </button>
        <button onclick="sekmeDegistir('ai')" id="nav-ai" class="flex flex-col items-center gap-1 text-slate-300 transition-all">
            <i class="fas fa-robot text-xl"></i>
            <span class="text-[9px] font-black uppercase tracking-tighter">AI KOÇ</span>
        </button>
        <button onclick="sekmeDegistir('gecmis')" id="nav-gecmis" class="flex flex-col items-center gap-1 text-slate-300 transition-all">
            <i class="fas fa-history text-xl"></i>
            <span class="text-[9px] font-black uppercase tracking-tighter">GEÇMİŞ</span>
        </button>
    </nav>

    <!-- Kütüphane Modalı -->
    <div id="kutuphane-modal" class="fixed inset-0 z-[80] bg-black/50 hidden flex items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-10 max-h-[80vh] overflow-y-auto" id="lib-panel">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">Egzersizler</h3>
                <button onclick="kutuphaneyiKapat()" class="text-slate-300 text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div id="lib-icerik" class="space-y-6"></div>
        </div>
    </div>

    <script>
        // --- DURUM VE VERİ ---
        let uygulamaDurumu = {
            apiKey: localStorage.getItem('gym_api_key_pro') || "",
            aktifProgram: JSON.parse(localStorage.getItem('gym_aktif_pro')) || [],
            gecmis: JSON.parse(localStorage.getItem('gym_gecmis_pro')) || [],
            timer: { interval: null, kalan: 0 }
        };

        const egzersizKütüphanesi = {
            "Göğüs": ["Bench Press", "Incline DB Press", "Dips", "Cable Fly"],
            "Sırt": ["Barbell Row", "Lat Pulldown", "Pull-up", "Seated Row"],
            "Bacak": ["Squat", "Leg Press", "Romanian DL", "Bulgarian Split"],
            "Omuz": ["Overhead Press", "Lateral Raise", "Face Pull"],
            "Kol": ["Barbell Curl", "Skullcrusher", "Tricep Pushdown"]
        };

        const terimler = {
            hacim: { baslik: "Hacim (Volume)", icerik: "Hacim = Ağırlık x Tekrar x Set. Kas gelişimi için toplam hacmin zamanla artması (Progressive Overload) gerekir." },
            oneRM: { baslik: "1RM (Tahmini)", icerik: "Bir hareketi tam formda sadece 1 kez yapabileceğiniz maksimum ağırlık. Güç seviyenizi ölçer." },
            rpe: { baslik: "RPE (Zorluk)", icerik: "Setin zorluk derecesi. 10: Limit, 8: 2 tekrar payı var. Yorgun olduğunuzda RPE'yi düşürmelisiniz." }
        };

        // --- ANA FONKSİYONLAR ---
        function arayuzuGuncelle() {
            const liste = document.getElementById('liste-egzersiz');
            liste.innerHTML = '';
            let toplamHacim = 0;

            if (uygulamaDurumu.aktifProgram.length === 0) {
                liste.innerHTML = `<div class="py-24 text-center opacity-20 font-bold uppercase text-[10px] tracking-widest italic">Liste Boş. AI Koç'tan program isteyin.</div>`;
            }

            uygulamaDurumu.aktifProgram.forEach((egzersiz, exIdx) => {
                const exHacim = egzersiz.setler.reduce((acc, s) => acc + (parseFloat(s.w || 0) * parseFloat(s.r || 0)), 0);
                toplamHacim += exHacim;

                const kart = document.createElement('div');
                kart.className = 'ios-card p-7 space-y-4';
                kart.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold text-slate-800 text-lg uppercase tracking-tighter">${egzersiz.ad}</h4>
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest italic">${exHacim.toLocaleString()} KG HACİM</span>
                                <button onclick="bilgiAc('hacim')" class="text-blue-200 text-xs"><i class="fas fa-question-circle"></i></button>
                            </div>
                        </div>
                        <button onclick="egzersizSil(${exIdx})" class="text-slate-100 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="space-y-3">
                        <div class="grid grid-cols-6 gap-2 text-[8px] font-black text-slate-300 uppercase text-center tracking-tighter">
                            <div>SET</div><div class="col-span-2">AĞIRLIK</div><div class="col-span-2">TEKRAR</div><div onclick="bilgiAc('oneRM')">1RM <i class="fas fa-info-circle"></i></div>
                        </div>
                        ${egzersiz.setler.map((s, sIdx) => `
                            <div class="grid grid-cols-6 gap-2 items-center">
                                <div class="text-center font-black text-slate-300 text-xs">${sIdx + 1}</div>
                                <div class="col-span-2 bg-slate-50 rounded-2xl py-3 border border-slate-100 focus-within:ring-1 focus-within:ring-blue-400">
                                    <input type="number" value="${s.w}" oninput="setGuncelle(${exIdx}, ${sIdx}, 'w', this.value)" placeholder="KG" class="w-full bg-transparent outline-none text-center font-bold text-slate-700">
                                </div>
                                <div class="col-span-2 bg-slate-50 rounded-2xl py-3 border border-slate-100 focus-within:ring-1 focus-within:ring-blue-400">
                                    <input type="number" value="${s.r}" oninput="setGuncelle(${exIdx}, ${sIdx}, 'r', this.value)" placeholder="TEK" class="w-full bg-transparent outline-none text-center font-bold text-slate-700">
                                </div>
                                <div class="text-center font-mono text-[10px] font-bold text-emerald-500">${birRMHesapla(s.w, s.r)}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex justify-between items-center pt-2">
                        <button onclick="setEkle(${exIdx})" class="text-blue-600 font-bold text-[10px] uppercase tracking-widest">+ SET EKLE</button>
                        <button onclick="timerBaslat(120)" class="text-orange-500 font-bold text-[10px] uppercase tracking-widest"><i class="fas fa-clock"></i> 2DK DİNLEN</button>
                    </div>
                `;
                liste.appendChild(kart);
            });

            document.getElementById('hacim-gosterge').innerText = `${toplamHacim.toLocaleString()} KG HACİM`;
            document.getElementById('bitir-btn').classList.toggle('hidden', uygulamaDurumu.aktifProgram.length === 0);
            localStorage.setItem('gym_aktif_pro', JSON.stringify(uygulamaDurumu.aktifProgram));
        }

        // --- AI KOÇ (Gemini) ---
        async function aiProgramHazirla() {
            if (!uygulamaDurumu.apiKey) return mesajGoster("Lütfen önce ayarlardan API Key girin.");
            
            const mod = document.getElementById('ai-mod-input').value;
            const odak = document.getElementById('ai-odak-input').value;
            if(!mod || !odak) return mesajGoster("Lütfen modunuzu ve odağınızı yazın.");

            const btnMetin = document.getElementById('ai-btn-metin');
            const yukleniyor = document.getElementById('ai-yukleniyor');
            const notKutusu = document.getElementById('ai-not-kutusu');
            const notMetin = document.getElementById('ai-not-metin');

            btnMetin.innerText = "Koç Programı Yazıyor...";
            yukleniyor.classList.remove('hidden');
            notKutusu.classList.add('hidden');

            const systemPrompt = `Sen profesyonel bir fitness koçusun. 1.72m boy, 76kg, %20 yağ oranına sahip birine program yazacaksın.
            CEVABINI SADECE JSON OLARAK VER:
            {
                "not": "Koçtan motive edici ve teknik bir tavsiye",
                "egzersizler": [
                    {"ad": "Egzersiz Adı", "setSayisi": 3},
                    {"ad": "Egzersiz Adı", "setSayisi": 4}
                ]
            }
            Dilin Türkçe olsun. 4-5 hareket öner.`;

            const userPrompt = `Modum: ${mod}. Odaklanmak istediğim yer: ${odak}. Bana bir program çıkar.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${uygulamaDurumu.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userPrompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error("API Hatası");

                const result = await response.json();
                const aiData = JSON.parse(result.candidates[0].content.parts[0].text);

                // Notu Göster
                notMetin.innerText = aiData.not;
                notKutusu.classList.remove('hidden');

                // Aktif Programa Aktar
                uygulamaDurumu.aktifProgram = aiData.egzersizler.map(ex => ({
                    ad: ex.ad,
                    setler: Array.from({ length: ex.setSayisi }, () => ({ w: '', r: '' }))
                }));

                arayuzuGuncelle();
                mesajGoster("Program Antrenman Sekmesine Aktarıldı!");
                
                setTimeout(() => {
                    sekmeDegistir('antrenman');
                }, 1500);

            } catch (err) {
                mesajGoster("Bağlantı Hatası! Lütfen anahtarınızı kontrol edin.");
            } finally {
                btnMetin.innerText = "PROGRAMI HAZIRLA";
                yukleniyor.classList.add('hidden');
            }
        }

        // --- YARDIMCI FONKSİYONLAR ---
        function setGuncelle(exI, sI, f, v) { uygulamaDurumu.aktifProgram[exI].setler[sI][f] = v; arayuzuGuncelle(); }
        function setEkle(exI) { uygulamaDurumu.aktifProgram[exI].setler.push({w:'', r:''}); arayuzuGuncelle(); }
        function egzersizSil(idx) { if(confirm("Egzersizi silmek istiyor musunuz?")) { uygulamaDurumu.aktifProgram.splice(idx, 1); arayuzuGuncelle(); } }
        function birRMHesapla(w, r) {
            const kg = parseFloat(w); const tek = parseFloat(r);
            if (!kg || !tek || tek <= 0) return 0;
            return Math.round(kg * (36 / (37 - tek)));
        }

        function sekmeDegistir(sekme) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-'+sekme).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-slate-300'));
            document.getElementById('nav-'+sekme).classList.add('tab-active');
            if(sekme === 'gecmis') gecmisiGoster();
        }

        function antrenmaniBitir() {
            if(!uygulamaDurumu.aktifProgram.length) return;
            const hacim = uygulamaDurumu.aktifProgram.reduce((a, ex) => a + ex.setler.reduce((sA, s) => sA + (parseFloat(s.w||0)*parseFloat(s.r||0)), 0), 0);
            uygulamaDurumu.gecmis.unshift({
                tarih: new Date().toLocaleDateString('tr-TR', { day:'numeric', month:'short' }),
                hacim: hacim
            });
            uygulamaDurumu.aktifProgram = [];
            localStorage.setItem('gym_gecmis_pro', JSON.stringify(uygulamaDurumu.gecmis));
            arayuzuGuncelle(); sekmeDegistir('gecmis');
        }

        function gecmisiGoster() {
            const liste = document.getElementById('liste-gecmis');
            liste.innerHTML = uygulamaDurumu.gecmis.length ? '' : '<p class="text-center py-24 opacity-20 italic">Geçmiş Boş</p>';
            uygulamaDurumu.gecmis.forEach(g => {
                const item = document.createElement('div');
                item.className = 'ios-card p-6 flex justify-between items-center';
                item.innerHTML = `<div><div class="text-[9px] font-black text-slate-300 uppercase">${g.tarih}</div><div class="text-xl font-bold tracking-tighter">${g.hacim.toLocaleString()} KG HACİM</div></div><i class="fas fa-check-circle text-emerald-500"></i>`;
                liste.appendChild(item);
            });
        }

        function ayarlariAc() { document.getElementById('ayarlar-modal').classList.toggle('hidden'); }
        function ayarlariKaydet() {
            uygulamaDurumu.apiKey = document.getElementById('api-key-input').value.trim();
            localStorage.setItem('gym_api_key_pro', uygulamaDurumu.apiKey);
            ayarlariAc(); mesajGoster("Ayarlar Kaydedildi");
        }

        function mesajGoster(m) {
            const b = document.getElementById('toast');
            if(!b) {
                const t = document.createElement('div');
                t.id = "toast";
                t.className = "fixed top-12 left-1/2 -translate-x-1/2 z-[200] bg-slate-900 text-white px-8 py-4 rounded-full text-xs font-bold uppercase shadow-2xl";
                t.innerHTML = `<span>${m}</span>`;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            }
        }

        function timerBaslat(s) {
            clearInterval(uygulamaDurumu.timer.interval);
            uygulamaDurumu.timer.kalan = s;
            document.getElementById('kronometre').classList.remove('hidden');
            uygulamaDurumu.timer.interval = setInterval(() => {
                uygulamaDurumu.timer.kalan--;
                const dk = Math.floor(uygulamaDurumu.timer.kalan / 60);
                const sn = uygulamaDurumu.timer.kalan % 60;
                document.getElementById('kronometre').innerText = `${dk.toString().padStart(2,'0')}:${sn.toString().padStart(2,'0')}`;
                if(uygulamaDurumu.timer.kalan <= 0) {
                    clearInterval(uygulamaDurumu.timer.interval);
                    mesajGoster("Süre Doldu! Sıradaki Set!");
                    setTimeout(() => document.getElementById('kronometre').classList.add('hidden'), 3000);
                }
            }, 1000);
        }

        // --- BİLGİ VE KÜTÜPHANE ---
        function bilgiAc(t) {
            document.getElementById('bilgi-baslik').innerText = terimler[t].baslik;
            document.getElementById('bilgi-icerik').innerText = terimler[t].icerik;
            document.getElementById('bilgi-modal').classList.remove('hidden');
        }
        function bilgiKapat() { document.getElementById('bilgi-modal').classList.add('hidden'); }

        function kutuphaneyiAc() {
            const modal = document.getElementById('kutuphane-modal');
            modal.classList.remove('hidden');
            const icerik = document.getElementById('lib-icerik');
            icerik.innerHTML = '';
            for(let grup in egzersizKütüphanesi) {
                const s = document.createElement('div');
                s.innerHTML = `<h4 class="text-[10px] font-black text-slate-300 uppercase mb-4 border-b pb-1 tracking-widest">${grup}</h4><div class="grid grid-cols-2 gap-3">${egzersizKütüphanesi[grup].map(ex => `<button onclick="egzersizEkle('${ex}')" class="p-5 bg-slate-50 rounded-2xl text-[11px] font-bold text-slate-700 text-left active:bg-blue-600 active:text-white">${ex}</button>`).join('')}</div>`;
                icerik.appendChild(s);
            }
        }
        function kutuphaneyiKapat() { document.getElementById('kutuphane-modal').classList.add('hidden'); }
        function egzersizEkle(ad) {
            uygulamaDurumu.aktifProgram.push({ ad, setler: [{w:'', r:''}] });
            kutuphaneyiKapat(); arayuzuGuncelle();
        }

        window.onload = arayuzuGuncelle;
    </script>
</body>
</html>
